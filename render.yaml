services:
  - type: web
    name: customer-segmentation
    runtime: python
    buildCommand: pip install -r requirements.txt && python src/main.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.10.12
